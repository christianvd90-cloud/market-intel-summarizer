services:
  market-intel-summarizer:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env   # Nunca se copia dentro de la imagen; solo se inyecta en runtime
    volumes:
      - ./data:/app/data:ro   # opcional: monta tus datos reales como solo-lectura
    restart: unless-stopped

  notifier:
    build: .
    env_file:
      - .env
    environment:
      # Dentro de la red de Docker Compose, los servicios se resuelven por
      # nombre de servicio, no por localhost.
      - MARKET_API_URL=http://market-intel-summarizer:8000
    command: ["python", "notifier.py", "--loop", "900"]
    depends_on:
      - market-intel-summarizer
    restart: unless-stopped
